<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>麻将计分本（金主版）</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}
body {
  font-family: "Microsoft YaHei", sans-serif;
  background: #f9f1f1;
  padding: 10px;
}

/* 通用统计面板样式 */
.stats-box {
  background: #fff;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 15px;
  overflow-x: auto;
}
.stats-title {
  font-weight: bold;
  color: #d92c2c;
  text-align: center;
  margin-bottom: 10px;
  font-size: 20px;
}
.stats-header {
  display: flex;
  font-weight: bold;
  font-size: 16px;
  color: #666;
  border-bottom: 1px solid #eee;
  padding-bottom: 8px;
}
.stats-row {
  display: flex;
  font-size: 15px;
  padding: 6px 0;
  border-bottom: 1px solid #f8f8f8;
}
.stats-name { 
  min-width: 70px; 
  font-weight: bold; 
  font-size: 16px;
}
.stats-item { 
  min-width: 45px; 
  text-align: center; 
  font-size: 15px;
}

/* 合并统计面板容器 */
.combined-stats-container {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}
.combined-block {
  flex: 1;
  min-width: 320px;
}
.game-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
  gap: 8px;
}

/* 放炮牌统计面板样式 */
.tile-stats-box {
  background: #fff;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 15px;
  overflow-x: auto;
}
.tile-stats-title {
  font-weight: bold;
  color: #d92c2c;
  text-align: center;
  margin-bottom: 12px;
  font-size: 18px;
}
.tile-stats-subtitle {
  font-weight: bold;
  font-size: 14px;
  color: #666;
  margin: 10px 0 6px;
  padding-left: 4px;
}
.tile-rank-grid {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}
.tile-rank-item {
  padding: 6px 8px;
  background: #f8f8f8;
  border-radius: 8px;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.tile-rank-char {
  font-size: 20px;
}
.person-tile-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 8px;
}
.person-tile-card {
  background: #f8f8f8;
  border-radius: 8px;
  padding: 8px;
}
.person-tile-name {
  font-weight: bold;
  margin-bottom: 6px;
  color: #d92c2c;
}
.person-tile-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  font-size: 12px;
}
.empty-tip {
  text-align: center;
  color: #999;
  padding: 10px 0;
  font-size: 14px;
}

/* 输赢榜统计面板样式 */
.settle-box {
  background: #fff;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 15px;
}
.settle-history-item {
  border-bottom: 1px solid #eee;
  padding: 8px 0;
  margin-bottom: 10px;
}
.settle-history-time {
  font-size: 12px;
  color: #999;
  margin-bottom: 6px;
}
.settle-rank-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
  margin: 3px 0;
  padding: 4px 8px;
  border-radius: 4px;
}
/* 金主爸爸专属高亮样式 */
.rank-gold {
  background: linear-gradient(90deg, #ffd700, #fff3cd);
  border: 2px solid #ffaa00;
  font-weight: bold;
  color: #b8860b;
}
.rank-1 {
  color: #2d882d;
  font-weight: bold;
}
.rank-last {
  color: #d92c2c;
  font-weight: bold;
}
.settle-result-text {
  font-weight: bold;
  color: #d92c2c;
  margin-top: 8px;
  font-size: 15px;
  text-align: center;
  background: #fff3cd;
  padding: 8px;
  border-radius: 6px;
}

/* 场地选择样式 */
.site-group {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.site-group input {
  display: none;
}
.site-group label {
  flex: 1;
  min-width: 80px;
  padding: 10px 6px;
  background: #f0f0f0;
  border-radius: 8px;
  text-align: center;
  font-weight: bold;
  font-size: 14px;
  border: 2px solid #ddd;
  cursor: pointer;
}
/* 水印城：蓝色 */
.site-group input[value="水印城"]:checked + label {
  background: #366895;
  color: #fff;
  border-color: #2a5277;
  box-shadow: 0 0 8px rgba(54,104,149,0.4);
}
/* 揽云锦绣：绿色 */
.site-group input[value="揽云锦绣"]:checked + label {
  background: #2d882d;
  color: #fff;
  border-color: #236b23;
  box-shadow: 0 0 8px rgba(45,136,45,0.4);
}

/* 人员选择样式 */
.person-group {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.person-group input {
  display: none;
}
.person-group label {
  flex: 1;
  min-width: 50px;
  padding: 8px 6px;
  background: #f0f0f0;
  border-radius: 8px;
  text-align: center;
  font-weight: bold;
  font-size: 14px;
  border: 2px solid #ddd;
  cursor: pointer;
}
.person-group input:checked + label {
  background: #d92c2c;
  color: #ffdd66;
  border-color: #ffaa00;
  box-shadow: 0 0 8px rgba(217,44,44,0.4);
}

/* 动作按钮样式 */
.action-group {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-bottom: 12px;
}
.action-group button {
  padding: 10px 4px;
  background: #e67e22;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  font-size: 14px;
}
.action-group button:active {
  background: #cc6c1c;
}
/* 输赢结算按钮特殊样式 */
.btn-settle { background: #9b59b6; grid-column: span 4; }

/* 日志 */
.log-box {
  background: #fff;
  border-radius: 12px;
  padding: 10px;
  height: 180px;
  overflow-y: auto;
  margin-bottom: 12px;
  font-size: 14px;
  line-height: 1.5;
}

/* 功能按钮 */
.func-group {
  display: flex;
  gap: 8px;
}
.func-group button {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 8px;
  color: #fff;
  font-weight: bold;
  font-size: 14px;
}
.btn-undo { background: #366895; }
.btn-clear { background: #e67e22; }
.btn-export { background: #2d882d; }

/* 通用弹窗 */
.modal {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  display: none;
  justify-content: center;
  align-items: center;
  padding: 20px;
  z-index: 999;
}
.modal.show { display: flex; }
.modal-box {
  background: #fff;
  border-radius: 12px;
  padding: 20px;
  width: 100%;
  max-width: 500px;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-title {
  font-weight: bold;
  text-align: center;
  margin-bottom: 15px;
  font-size: 18px;
}

/* 输赢结算弹窗样式 */
.gold-select-group {
  margin-bottom: 15px;
  padding: 10px;
  background: #fff3cd;
  border-radius: 8px;
  border: 1px solid #ffc107;
}
.gold-select-label {
  font-weight: bold;
  color: #b8860b;
  margin-bottom: 8px;
  display: block;
  text-align: center;
}
.gold-select {
  width: 100%;
  padding: 10px;
  border: 2px solid #ffc107;
  border-radius: 8px;
  font-size: 16px;
  font-weight: bold;
  text-align: center;
  background: #fff;
}
.settle-input-group {
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.settle-input-label {
  width: 60px;
  font-weight: bold;
}
.settle-input {
  flex: 1;
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 16px;
  text-align: right;
}
.settle-btn-group {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}
.settle-btn-group button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  font-size: 16px;
}
.btn-save-settle { background: #2d882d; color: #fff; }
.btn-cancel-settle { background: #ddd; color: #333; }

/* 选牌弹窗 */
.tile-grid {
  display: grid;
  grid-template-columns: repeat(9, 1fr);
  gap: 8px;
  margin-bottom: 15px;
}
.tile-btn {
  padding: 8px;
  font-size: 32px;
  border: 1px solid #ddd;
  border-radius: 8px;
  background: #fff;
  cursor: pointer;
}
.tile-btn:active {
  background: #f0f0f0;
  border-color: #d92c2c;
}
.tile-type-title {
  font-weight: bold;
  margin: 10px 0 5px;
  color: #666;
}

/* 选人弹窗 */
.target-list {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.target-list button {
  padding: 14px;
  background: #d92c2c;
  color: #ffdd66;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  font-size: 16px;
}
</style>
</head>
<body>

<!-- 场地选择 -->
<div class="site-group">
  <input type="radio" name="site" id="s1" value="水印城" checked>
  <label for="s1">水印城</label>

  <input type="radio" name="site" id="s2" value="揽云锦绣">
  <label for="s2">揽云锦绣</label>
</div>

<!-- 基础数据统计面板 -->
<div class="stats-box">
  <div class="stats-title">实时统计</div>
  <div class="stats-header">
    <div class="stats-name">玩家</div>
    <div class="stats-item">放炮</div>
    <div class="stats-item">获胜</div>
    <div class="stats-item">截胡</div>
    <div class="stats-item">被截</div>
    <div class="stats-item">泥鳅</div>
    <div class="stats-item">庄500</div>
    <div class="stats-item">辣子</div>
    <div class="stats-item">200+</div>
    <div class="stats-item">60内</div>
    <div class="stats-item">三财神</div>
    <div class="stats-item">4白板</div>
    <div class="stats-item">被跟</div>
    <div class="stats-item">诈胡</div>
    <div class="stats-item">姥姥</div>
    <div class="stats-item">牌局</div>
  </div>
  <div id="stats"></div>
</div>

<!-- 合并：放炮牌统计 + 牌局参与统计面板 -->
<div class="tile-stats-box">
  <div class="tile-stats-title">放炮牌&牌局参与统计</div>
  <div class="combined-stats-container">
    <!-- 左侧：放炮牌统计 -->
    <div class="combined-block">
      <div class="tile-stats-subtitle">全局放炮牌排行（次数从高到低）</div>
      <div class="tile-rank-grid" id="globalTileRank"></div>

      <div class="tile-stats-subtitle">个人放炮牌明细</div>
      <div class="person-tile-grid" id="personTileDetail"></div>
    </div>

    <!-- 右侧：牌局参与统计 -->
    <div class="combined-block">
      <div class="tile-stats-subtitle">牌局参与统计</div>
      <div class="game-grid" id="gameCountDetail"></div>
    </div>
  </div>
</div>

<!-- 输赢榜展示 -->
<div class="settle-box" id="settleBox" style="display:none;">
  <div class="tile-stats-title">🏆 历史输赢榜 & 金主记录</div>
  <div id="settleHistory"></div>
</div>

<!-- 玩家选择 -->
<div class="person-group">
  <input type="radio" name="user" id="u1" value="Huai" checked>
  <label for="u1">Huai</label>

  <input type="radio" name="user" id="u2" value="Su">
  <label for="u2">Su</label>

  <input type="radio" name="user" id="u3" value="Yan">
  <label for="u3">Yan</label>

  <input type="radio" name="user" id="u4" value="Wang">
  <label for="u4">Wang</label>

  <input type="radio" name="user" id="u5" value="PP">
  <label for="u5">PP</label>
</div>

<!-- 动作按钮 -->
<div class="action-group">
  <button onclick="preparePao()">放炮</button>
  <button onclick="prepareJieHu()">截胡</button>
  <button onclick="actOne('泥鳅')">泥鳅</button>
  <button onclick="actOne('庄上500胡')">庄500胡</button>

  <button onclick="actOne('辣子')">辣子</button>
  <button onclick="actOne('200胡以上')">200+</button>
  <button onclick="actOne('60胡以内')">60内</button>
  <button onclick="actOne('三财神')">三财神</button>

  <button onclick="actOne('4白板')">4白板</button>
  <button onclick="actOne('第一张被跟')">被跟</button>
  <button onclick="actOne('诈胡')">诈胡</button>
  <button onclick="actOne('姥姥')">姥姥</button>
  
  <button onclick="prepareOB()" style="background:#8e44ad;">边缘OB</button>
  <button onclick="openSettleModal()" class="btn-settle">👑 输赢结算（指定金主）</button>
</div>

<!-- 操作日志 -->
<div class="log-box" id="log"></div>

<!-- 功能按钮 -->
<div class="func-group">
  <button class="btn-undo" onclick="undo()">撤销</button>
  <button class="btn-clear" onclick="clearAll()">清空</button>
  <button class="btn-export" onclick="exportExcel()">导出Excel</button>
</div>

<!-- 选牌弹窗 -->
<div class="modal" id="tileModal">
  <div class="modal-box">
    <div class="modal-title">请选择放炮的牌</div>
    
    <div class="tile-type-title">万子</div>
    <div class="tile-grid" id="wanGrid"></div>

    <div class="tile-type-title">条子</div>
    <div class="tile-grid" id="tiaoGrid"></div>

    <div class="tile-type-title">筒子</div>
    <div class="tile-grid" id="tongGrid"></div>

    <div class="tile-type-title">字牌</div>
    <div class="tile-grid" id="ziGrid"></div>
  </div>
</div>

<!-- 选人弹窗 -->
<div class="modal" id="personModal">
  <div class="modal-box">
    <div class="modal-title" id="personModalTitle">选择目标</div>
    <div class="target-list" id="personList"></div>
  </div>
</div>

<!-- 输赢结算弹窗 -->
<div class="modal" id="settleModal">
  <div class="modal-box">
    <div class="modal-title">💰 最终输赢结算</div>
    
    <!-- 金主爸爸名次选择 -->
    <div class="gold-select-group">
      <label class="gold-select-label">👉 请指定本次付钱的金主爸爸为第几名</label>
      <select id="goldRankSelect" class="gold-select">
        <option value="1">第1名</option>
        <option value="2">第2名</option>
        <option value="3">第3名</option>
        <option value="4">第4名</option>
        <option value="5" selected>第5名（默认输最多）</option>
      </select>
    </div>

    <div id="settleInputs"></div>
    <div class="settle-btn-group">
      <button class="btn-cancel-settle" onclick="closeModal(settleModal)">取消</button>
      <button class="btn-save-settle" onclick="saveSettle()">确认结算</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
// 全局配置
const users = ["Huai", "Su", "Yan", "Wang", "PP"];
let records = [];
let settleRecords = []; // 输赢记录（含金主信息）
let currentPaoUser = ""; // 当前放炮的人
let selectedTile = { char: "", name: "" }; // 当前选中的牌
let currentActionType = ""; // 当前动作类型

// 麻将牌Unicode与中文名称映射
const tileConfig = {
  wan: [
    { char: "🀇", name: "一万" }, { char: "🀈", name: "二万" }, { char: "🀉", name: "三万" },
    { char: "🀊", name: "四万" }, { char: "🀋", name: "五万" }, { char: "🀌", name: "六万" },
    { char: "🀍", name: "七万" }, { char: "🀎", name: "八万" }, { char: "🀏", name: "九万" }
  ],
  tiao: [
    { char: "🀐", name: "一条" }, { char: "🀑", name: "二条" }, { char: "🀒", name: "三条" },
    { char: "🀓", name: "四条" }, { char: "🀔", name: "五条" }, { char: "🀕", name: "六条" },
    { char: "🀖", name: "七条" }, { char: "🀗", name: "八条" }, { char: "🀘", name: "九条" }
  ],
  tong: [
    { char: "🀙", name: "一筒" }, { char: "🀚", name: "二筒" }, { char: "🀛", name: "三筒" },
    { char: "🀜", name: "四筒" }, { char: "🀝", name: "五筒" }, { char: "🀞", name: "六筒" },
    { char: "🀟", name: "七筒" }, { char: "🀠", name: "八筒" }, { char: "🀡", name: "九筒" }
  ],
  zi: [
    { char: "🀀", name: "东" }, { char: "🀁", name: "南" }, { char: "🀂", name: "西" },
    { char: "🀃", name: "北" }, { char: "🀄", name: "中" }, { char: "🀅", name: "发" },
    { char: "🀆", name: "白" }
  ]
};

// DOM元素
const tileModal = document.getElementById("tileModal");
const personModal = document.getElementById("personModal");
const personModalTitle = document.getElementById("personModalTitle");
const personList = document.getElementById("personList");
const log = document.getElementById("log");
const stats = document.getElementById("stats");
const globalTileRank = document.getElementById("globalTileRank");
const personTileDetail = document.getElementById("personTileDetail");
const gameCountDetail = document.getElementById("gameCountDetail");
const settleModal = document.getElementById("settleModal");
const settleInputs = document.getElementById("settleInputs");
const settleHistory = document.getElementById("settleHistory");
const settleBox = document.getElementById("settleBox");
const goldRankSelect = document.getElementById("goldRankSelect");

// 初始化渲染麻将牌
function initTiles() {
  for (let type in tileConfig) {
    const grid = document.getElementById(`${type}Grid`);
    tileConfig[type].forEach(tile => {
      const btn = document.createElement("button");
      btn.className = "tile-btn";
      btn.innerText = tile.char;
      btn.onclick = () => {
        selectedTile = tile;
        closeModal(tileModal);
        currentActionType = "pao";
        openPersonModal();
      };
      grid.appendChild(btn);
    });
  }
}

// 时间格式化
function now() {
  const d = new Date();
  const pad = n=>n.toString().padStart(2,"0");
  return `${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

// 日期格式化
function getDateStr() {
  const d = new Date();
  const pad = n=>n.toString().padStart(2,"0");
  return `${String(d.getFullYear()).slice(2)}${pad(d.getMonth()+1)}${pad(d.getDate())}`;
}

// 获取选中的场地
function getSelectedSite() {
  const r = document.querySelector('input[name="site"]:checked');
  if (!r) {
    alert("请先选择场地！");
    return null;
  }
  return r.value;
}

// 获取当前选中的执行人（修复核心BUG：直接返回字符串）
function getSelectedUser() {
  const r = document.querySelector('input[name="user"]:checked');
  if (!r) {
    alert("请先选择操作人！");
    return null;
  }
  return r.value; // 直接返回玩家名字字符串，如"Huai"
}

// 基础数据统计核心
function calcBaseStats() {
  let st = {};
  users.forEach(u=>st[u]={
    p:0,w:0,j:0,bj:0,n:0,z:0,l:0,a2:0,a6:0,c3:0,b4:0,bg:0,zh:0,ll:0,game:0
  });
  records.forEach(r=>{
    if (r.t === "pao") { 
      st[r.from].p++; 
      st[r.to].w++; 
    }
    if (r.t === "jie") { 
      st[r.from].j++; 
      st[r.to].bj++; 
    }
    if (r.t === "ob") {
      users.forEach(u => {
        if (!r.obUsers.includes(u)) {
          st[u].game++;
        }
      });
    }
    if (r.t === "one") {
      const u = r.f;
      if (r.a==="泥鳅") st[u].n++;
      if (r.a==="庄上500胡") st[u].z++;
      if (r.a==="辣子") st[u].l++;
      if (r.a==="200胡以上") st[u].a2++;
      if (r.a==="60胡以内") st[u].a6++;
      if (r.a==="三财神") st[u].c3++;
      if (r.a==="4白板") st[u].b4++;
      if (r.a==="第一张被跟") st[u].bg++;
      if (r.a==="诈胡") st[u].zh++;
      if (r.a==="姥姥") st[u].ll++;
    }
  });
  return st;
}

// 放炮牌统计核心
function calcTileStats() {
  let globalCount = {};
  let personCount = {};
  users.forEach(u => personCount[u] = {});

  records.filter(r => r.t === "pao").forEach(r => {
    const tileKey = `${r.tileName}${r.tile}`;
    const user = r.from;
    globalCount[tileKey] = (globalCount[tileKey] || 0) + 1;
    personCount[user][tileKey] = (personCount[user][tileKey] || 0) + 1;
  });

  const sortedGlobal = Object.entries(globalCount)
    .sort((a,b) => b[1] - a[1])
    .map(item => ({ tile: item[0], count: item[1] }));

  return { sortedGlobal, personCount };
}

  let personHtml = "";

      .sort((a,b) => b[1] - a[1]);

// 刷新输赢榜UI
function refreshSettleUI() {
  if (settleRecords.length === 0) {
    settleBox.style.display = "none";
    return;
  }

  settleBox.style.display = "block";
  let html = "";
  
  // 倒序显示
  [...settleRecords].reverse().forEach(rec => {
    html += `<div class="settle-history-item">
      <div class="settle-history-time">${rec.time}</div>`;
    
    rec.ranked.forEach((item, idx) => {
      const rank = idx + 1;
      const isGold = rank === rec.goldRank;
      const amountColor = item.amount > 0 ? "color:#2d882d" : (item.amount < 0 ? "color:#d92c2c" : "");
      let className = "settle-rank-row";
      
      if (isGold) className += " rank-gold";
      else if (rank === 1) className += " rank-1";
      else if (rank === rec.ranked.length) className += " rank-last";

      const goldTag = isGold ? "👑 金主爸爸" : "";
      html += `<div class="${className}">
        <span>第${rank}名：${item.user} ${goldTag}</span>
        <span style="${amountColor}; font-weight:bold;">${item.amount > 0 ? '+' : ''}${item.amount.toFixed(2)} 元</span>
      </div>`;
    });

    html += `<div class="settle-result-text">${rec.resultText}</div></div>`;
  });

  settleHistory.innerHTML = html;
}

// 弹窗控制
function openModal(modal) { modal.classList.add("show"); }
function closeModal(modal) { modal.classList.remove("show"); }

// ========== 输赢结算核心流程 ==========
function openSettleModal() {
  if (!getSelectedSite()) return;
  
  // 生成玩家金额输入框
  settleInputs.innerHTML = "";
  users.forEach(u => {
    const div = document.createElement("div");
    div.className = "settle-input-group";
    div.innerHTML = `
      <div class="settle-input-label">${u}</div>
      <input type="number" class="settle-input" id="settle_${u}" placeholder="输入金额（赢为正，输为负）" value="0">
    `;
    settleInputs.appendChild(div);
  });
  openModal(settleModal);
}

function saveSettle() {
  // 1. 获取用户指定的金主名次
  const goldRank = parseInt(goldRankSelect.value);
  
  // 2. 收集所有玩家的金额
  let amounts = [];
  users.forEach(u => {
    const input = document.getElementById(`settle_${u}`);
    let val = parseFloat(input.value) || 0;
    amounts.push({ user: u, amount: val });
  });

  // 3. 按金额从大到小自动排序
  const ranked = [...amounts].sort((a, b) => b.amount - a.amount);

  // 4. 锁定金主爸爸
  const goldUser = ranked[goldRank - 1];

  // 5. 生成结算结果文案
  const resultText = `本次指定第${goldRank}名为金主爸爸👑：${goldUser.user} 负责付钱！`;

  // 6. 保存记录
  const record = {
    time: now(),
    goldRank: goldRank,
    goldUser: goldUser.user,
    ranked: ranked,
    resultText: resultText,
    raw: amounts
  };

  settleRecords.push(record);
  closeModal(settleModal);
  refresh();
}

// 撤销/清空（修复）
function undo() { 
  if (!getSelectedSite()) return;
  if (records.length === 0 && settleRecords.length === 0) {
    alert("暂无记录可撤销");
    return;
  }
  
  // 撤销最新的一条记录
  const lastRecTime = records.length > 0 ? records[records.length-1].time : "0";
  const lastSetTime = settleRecords.length > 0 ? settleRecords[settleRecords.length-1].time : "0";
  
  if (lastRecTime > lastSetTime) {
    records.pop();
    alert("已撤销上一条操作记录");
  } else if (settleRecords.length > 0) {
    settleRecords.pop();
    alert("已撤销上一条结算记录");
  }
  refresh(); 
}

function clearAll() { 
  if (!getSelectedSite()) return;
  if(confirm("确定清空所有记录？包括操作记录、输赢榜、金主记录全部清空！")){ 
    records=[]; 
    settleRecords=[];
    refresh(); 
  } 
}

// Excel导出（完整修复）
function exportExcel() {
  const site = getSelectedSite();
  if (!site) return;
  
  if (records.length===0 && settleRecords.length===0) { alert("暂无记录可导出"); return; }

  const baseStats = calcBaseStats();
  const tileStats = calcTileStats();

  // Sheet1 实时战报
  const sheet1 = [["时间","描述","放炮","获胜","截胡","被截","泥鳅","庄500","辣子","200+","60内","三财神","4白板","被跟","诈胡","姥姥","放炮牌"]];
  records.forEach(r=>{
    let row = ["","","","","","","","","","","","","","","","",""];
    row[0] = r.time;
    row[1] = r.desc;
    if (r.t==="pao") { 
      row[2]=r.from; 
      row[3]=r.to; 
      row[16] = `${r.tileName}${r.tile}`;
    }
    if (r.t==="jie") { row[4]=r.from; row[5]=r.to; }
    if (r.t==="one") {
      const idx = {
        "泥鳅":6,"庄上500胡":7,"辣子":8,"200胡以上":9,"60胡以内":10,"三财神":11,"4白板":12,
        "第一张被跟":13,"诈胡":14,"姥姥":15
      }[r.a];
      if (idx) row[idx] = r.f;
    }
    sheet1.push(row);
  });

  // Sheet2 基础计数统计
  const sheet2 = [["玩家","放炮","获胜","截胡","被截","泥鳅","庄500","辣子","200+","60内","三财神","4白板","被跟","诈胡","姥姥","牌局数"]];
  users.forEach(u=>{
    sheet2.push([u, baseStats[u].p, baseStats[u].w, baseStats[u].j, baseStats[u].bj,
      baseStats[u].n, baseStats[u].z, baseStats[u].l, baseStats[u].a2, baseStats[u].a6, baseStats[u].c3, baseStats[u].b4,
      baseStats[u].bg, baseStats[u].zh, baseStats[u].ll, baseStats[u].game]);
  });

  // Sheet3 放炮牌统计 & 牌局统计
  const sheet3 = [["全局放炮牌排行","",""], ["牌名","字符","放炮次数"]];
  tileStats.sortedGlobal.forEach(item => {
    sheet3.push([item.tile.slice(0,-2), item.tile.slice(-2), item.count]);
  });
  sheet3.push([]);
  sheet3.push(["个人放炮牌明细","",""]);
  sheet3.push(["玩家","牌名","放炮次数"]);
  users.forEach(user => {
    const userTiles = Object.entries(tileStats.personCount[user])
      .sort((a,b) => b[1] - a[1]);
    userTiles.forEach(item => {
      sheet3.push([user, item[0], item[1]]);
    });
  });
  sheet3.push([]);
  sheet3.push(["牌局参与统计",""]);
  sheet3.push(["玩家","参与牌局数"]);
  users.forEach(u => {
    sheet3.push([u, baseStats[u].game]);
  });

  // Sheet4 输赢结算&金主爸爸记录
  const sheet4 = [["👑 输赢结算&金主爸爸完整记录"]];
  sheet4.push(["结算时间", "排名", "玩家", "输赢金额", "是否金主爸爸", "本次金主规则"]);
  
  settleRecords.forEach(rec => {
    const ruleText = `指定第${rec.goldRank}名为金主`;
    rec.ranked.forEach((item, idx) => {
      const rank = idx + 1;
      const isGold = rank === rec.goldRank ? "是👑" : "否";
      const timeCell = idx === 0 ? rec.time : "";
      const ruleCell = idx === 0 ? ruleText : "";
      sheet4.push([timeCell, `第${rank}名`, item.user, item.amount, isGold, ruleCell]);
    });
    sheet4.push([]);
  });

  // 生成Excel文件
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(sheet1), "实时战报");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(sheet2), "计数统计");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(sheet3), "放炮牌统计");
  if (settleRecords.length > 0) {
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(sheet4), "输赢结算&金主记录");
  }
  
  const fileName = `${site}_${getDateStr()}_麻将战报_含金主记录.xlsx`;
  XLSX.writeFile(wb, fileName);
}

// 本地存储
function saveToLocal() {
  localStorage.setItem('mj_records_v2', JSON.stringify(records));
  localStorage.setItem('mj_settle_records_v2', JSON.stringify(settleRecords));
}
function loadFromLocal() {
  try {
    const data = localStorage.getItem('mj_records_v2');
    if (data) records = JSON.parse(data);
    const dataSettle = localStorage.getItem('mj_settle_records_v2');
    if (dataSettle) settleRecords = JSON.parse(dataSettle);
  } catch (e) {}
}

refresh();
