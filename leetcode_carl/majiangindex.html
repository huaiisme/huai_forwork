<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>йә»е°Ҷи®ЎеҲҶжң¬</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}
body {
  font-family: "Microsoft YaHei", sans-serif;
  background: #f9f1f1;
  padding: 10px;
}

/* з»ҹи®Ўйқўжқҝ */
.stats-box {
  background: #fff;
  border-radius: 12px;
  padding: 10px;
  margin-bottom: 12px;
  overflow-x: auto;
}
.stats-title {
  font-weight: bold;
  color: #d92c2c;
  text-align: center;
  margin-bottom: 6px;
}
.stats-header {
  display: flex;
  font-weight: bold;
  font-size: 12px;
  color: #666;
  border-bottom: 1px solid #eee;
  padding-bottom: 4px;
}
.stats-row {
  display: flex;
  font-size: 13px;
  padding: 3px 0;
}
.stats-name { min-width: 50px; font-weight: bold; }
.stats-item { min-width: 34px; text-align: center; }

/* дәәе‘ҳйҖүжӢ© */
.person-group {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.person-group input {
  display: none;
}
.person-group label {
  flex: 1;
  min-width: 60px;
  padding: 14px 8px;
  background: #f0f0f0;
  border-radius: 10px;
  text-align: center;
  font-weight: bold;
  font-size: 16px;
  border: 2px solid #ddd;
  cursor: pointer;
}
.person-group input:checked + label {
  background: #d92c2c;
  color: #ffdd66;
  border-color: #ffaa00;
  box-shadow: 0 0 8px rgba(217,44,44,0.4);
}

/* еҠЁдҪңжҢүй’® */
.action-group {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 12px;
}
.action-group button {
  padding: 18px 8px;
  background: #d92c2c;
  color: #ffdd66;
  border: none;
  border-radius: 10px;
  font-weight: bold;
  font-size: 16px;
}
.action-group button:active {
  background: #b82222;
}

/* ж—Ҙеҝ— */
.log-box {
  background: #fff;
  border-radius: 12px;
  padding: 10px;
  height: 260px;
  overflow-y: auto;
  margin-bottom: 12px;
  font-size: 14px;
  line-height: 1.5;
}

/* еҠҹиғҪжҢүй’® */
.func-group {
  display: flex;
  gap: 8px;
}
.func-group button {
  flex: 1;
  padding: 14px;
  border: none;
  border-radius: 10px;
  color: #fff;
  font-weight: bold;
}
.btn-undo { background: #366895; }
.btn-clear { background: #e67e22; }
.btn-export { background: #2d882d; }

/* еј№зӘ— */
#modal {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  display: none;
  justify-content: center;
  align-items: center;
}
#modal.show { display: flex; }
.modal-box {
  background: #fff;
  border-radius: 12px;
  padding: 20px;
  width: 90%;
  max-width: 360px;
}
.modal-title {
  font-weight: bold;
  text-align: center;
  margin-bottom: 15px;
}
.target-list {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.target-list button {
  padding: 12px;
  background: #d92c2c;
  color: #ffdd66;
  border: none;
  border-radius: 8px;
  font-weight: bold;
}
</style>
</head>
<body>

<div class="stats-box">
  <div class="stats-title">е®һж—¶з»ҹи®Ў</div>
  <div class="stats-header">
    <div class="stats-name">зҺ©е®¶</div>
    <div class="stats-item">ж”ҫзӮ®</div>
    <div class="stats-item">иҺ·иғң</div>
    <div class="stats-item">жҲӘиғЎ</div>
    <div class="stats-item">иў«жҲӘ</div>
    <div class="stats-item">жіҘйі…</div>
    <div class="stats-item">еә„500</div>
    <div class="stats-item">иҫЈеӯҗ</div>
    <div class="stats-item">200+</div>
    <div class="stats-item">60еҶ…</div>
    <div class="stats-item">дёүиҙўзҘһ</div>
    <div class="stats-item">4зҷҪжқҝ</div>
    <div class="stats-item">иў«и·ҹ</div>
    <div class="stats-item">иҜҲиғЎ</div>
    <div class="stats-item">е§Ҙе§Ҙ</div>
  </div>
  <div id="stats"></div>
</div>

<div class="person-group">
  <input type="radio" name="user" id="u1" value="Huai">
  <label for="u1">Huai</label>

  <input type="radio" name="user" id="u2" value="Su">
  <label for="u2">Su</label>

  <input type="radio" name="user" id="u3" value="Yan">
  <label for="u3">Yan</label>

  <input type="radio" name="user" id="u4" value="Wang">
  <label for="u4">Wang</label>

  <input type="radio" name="user" id="u5" value="PP">
  <label for="u5">PP</label>
</div>

<div class="action-group">
  <button onclick="actPao()">ж”ҫзӮ®</button>
  <button onclick="actJie()">жҲӘиғЎ</button>
  <button onclick="actOne('жіҘйі…')">жіҘйі…</button>

  <button onclick="actOne('еә„дёҠ500иғЎ')">еә„500иғЎ</button>
  <button onclick="actOne('иҫЈеӯҗ')">иҫЈеӯҗ</button>
  <button onclick="actOne('200иғЎд»ҘдёҠ')">200+</button>

  <button onclick="actOne('60иғЎд»ҘеҶ…')">60еҶ…</button>
  <button onclick="actOne('дёүиҙўзҘһ')">дёүиҙўзҘһ</button>
  <button onclick="actOne('4зҷҪжқҝ')">4зҷҪжқҝ</button>

  <button onclick="actOne('з¬¬дёҖеј иў«и·ҹ')">иў«и·ҹ</button>
  <button onclick="actOne('иҜҲиғЎ')">иҜҲиғЎ</button>
  <button onclick="actOne('е§Ҙе§Ҙ')">е§Ҙе§Ҙ</button>
</div>

<div class="log-box" id="log"></div>

<div class="func-group">
  <button class="btn-undo" onclick="undo()">ж’Өй”Җ</button>
  <button class="btn-clear" onclick="clearAll()">жё…з©ә</button>
  <button class="btn-export" onclick="exportExcel()">еҜјеҮәExcel</button>
</div>

<div id="modal">
  <div class="modal-box">
    <div class="modal-title" id="mTitle"></div>
    <div class="target-list" id="mList"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
const users = ["Huai","Su","Yan","Wang","PP"];
let records = [];
const modal = document.getElementById("modal");
const mTitle = document.getElementById("mTitle");
const mList = document.getElementById("mList");
const log = document.getElementById("log");
const stats = document.getElementById("stats");

function now() {
  const d = new Date();
  const pad = n=>n.toString().padStart(2,"0");
  return `${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function me() {
  const r = document.querySelector('input[name="user"]:checked');
  if (!r) {
    alert("иҜ·е…ҲйҖүжӢ©еҠЁдҪңжү§иЎҢдәәпјҒ");
    return null;
  }
  return r.value;
}

// з»ҹи®Ўи®Ўз®—пјҲж–°еўһ3йЎ№пјү
function calcStats() {
  let st = {};
  users.forEach(u=>st[u]={
    p:0,w:0,j:0,bj:0,n:0,z:0,l:0,a2:0,a6:0,c3:0,b4:0,
    bg:0,zh:0,ll:0 // ж–°еўһпјҡиў«и·ҹгҖҒиҜҲиғЎгҖҒе§Ҙе§Ҙ
  });
  records.forEach(r=>{
    if (r.t === "pao") { st[r.f].p++; st[r.tg].w++; }
    if (r.t === "jie") { st[r.f].j++; st[r.tg].bj++; }
    if (r.t === "one") {
      const u = r.f;
      if (r.a==="жіҘйі…") st[u].n++;
      if (r.a==="еә„дёҠ500иғЎ") st[u].z++;
      if (r.a==="иҫЈеӯҗ") st[u].l++;
      if (r.a==="200иғЎд»ҘдёҠ") st[u].a2++;
      if (r.a==="60иғЎд»ҘеҶ…") st[u].a6++;
      if (r.a==="дёүиҙўзҘһ") st[u].c3++;
      if (r.a==="4зҷҪжқҝ") st[u].b4++;
      // ж–°еўһ3йЎ№
      if (r.a==="з¬¬дёҖеј иў«и·ҹ") st[u].bg++;
      if (r.a==="иҜҲиғЎ") st[u].zh++;
      if (r.a==="е§Ҙе§Ҙ") st[u].ll++;
    }
  });
  return st;
}

// еҲ·ж–°з•ҢйқўпјҲж–°еўһ3еҲ—жҳҫзӨәпјү
function refresh() {
  const st = calcStats();
  let html = "";
  users.forEach(u=>{
    html+=`<div class="stats-row">
      <div class="stats-name">${u}</div>
      <div class="stats-item">${st[u].p}</div>
      <div class="stats-item">${st[u].w}</div>
      <div class="stats-item">${st[u].j}</div>
      <div class="stats-item">${st[u].bj}</div>
      <div class="stats-item">${st[u].n}</div>
      <div class="stats-item">${st[u].z}</div>
      <div class="stats-item">${st[u].l}</div>
      <div class="stats-item">${st[u].a2}</div>
      <div class="stats-item">${st[u].a6}</div>
      <div class="stats-item">${st[u].c3}</div>
      <div class="stats-item">${st[u].b4}</div>
      <div class="stats-item">${st[u].bg}</div>
      <div class="stats-item">${st[u].zh}</div>
      <div class="stats-item">${st[u].ll}</div>
    </div>`;
  });
  stats.innerHTML = html;
  log.innerText = records.map(r=>`[${r.time}] ${r.desc}`).join("\n");
}

function pop(title, cb) {
  mTitle.innerText = title;
  mList.innerHTML = "";
  const cur = me();
  users.filter(u=>u!==cur).forEach(tg=>{
    const btn = document.createElement("button");
    btn.innerText = tg;
    btn.onclick = ()=>{ modal.classList.remove("show"); cb(tg); };
    mList.appendChild(btn);
  });
  modal.classList.add("show");
}

function actPao() {
  const cur = me(); if (!cur) return;
  pop("ж”ҫзӮ®з»ҷи°Ғпјҹ", tg=>{
    records.push({t:"pao",f:cur,tg:tg,desc:`${cur}вҶ’ж”ҫзӮ®з»ҷвҶ’${tg}`,time:now()});
    refresh();
  });
}

function actJie() {
  const cur = me(); if (!cur) return;
  pop("жҲӘиғЎи°Ғпјҹ", tg=>{
    records.push({t:"jie",f:cur,tg:tg,desc:`${cur}вҶ’жҲӘиғЎвҶ’${tg}`,time:now()});
    refresh();
  });
}

function actOne(a) {
  const cur = me(); if (!cur) return;
  records.push({t:"one",f:cur,a:a,desc:`${cur}пҪң${a}`,time:now()});
  refresh();
}

function undo() { records.pop(); refresh(); }
function clearAll() { if(confirm("зЎ®е®ҡжё…з©әжүҖжңүи®°еҪ•пјҹ")){ records=[]; refresh(); } }

// еҜјеҮәеҸҢSheet ExcelпјҲж–°еўһ3еҲ—пјү
function exportExcel() {
  if (records.length===0) { alert("жҡӮж— и®°еҪ•еҸҜеҜјеҮә"); return; }

  // Sheet1 е®һж—¶жҲҳжҠҘ
  const sheet1 = [["ж—¶й—ҙ","жҸҸиҝ°","ж”ҫзӮ®","иҺ·иғң","жҲӘиғЎ","иў«жҲӘ","жіҘйі…","еә„500","иҫЈеӯҗ","200+","60еҶ…","дёүиҙўзҘһ","4зҷҪжқҝ","иў«и·ҹ","иҜҲиғЎ","е§Ҙе§Ҙ"]];
  records.forEach(r=>{
    let row = ["","","","","","","","","","","","","","","",""];
    row[0] = r.time;
    row[1] = r.desc;
    if (r.t==="pao") { row[2]=r.f; row[3]=r.tg; }
    if (r.t==="jie") { row[4]=r.f; row[5]=r.tg; }
    if (r.t==="one") {
      const idx = {
        "жіҘйі…":6,"еә„дёҠ500иғЎ":7,"иҫЈеӯҗ":8,"200иғЎд»ҘдёҠ":9,"60иғЎд»ҘеҶ…":10,"дёүиҙўзҘһ":11,"4зҷҪжқҝ":12,
        "з¬¬дёҖеј иў«и·ҹ":13,"иҜҲиғЎ":14,"е§Ҙе§Ҙ":15
      }[r.a];
      if (idx) row[idx] = r.f;
    }
    sheet1.push(row);
  });

  // Sheet2 и®Ўж•°з»ҹи®Ў
  const st = calcStats();
  const sheet2 = [["зҺ©е®¶","ж”ҫзӮ®","иҺ·иғң","жҲӘиғЎ","иў«жҲӘ","жіҘйі…","еә„500","иҫЈеӯҗ","200+","60еҶ…","дёүиҙўзҘһ","4зҷҪжқҝ","иў«и·ҹ","иҜҲиғЎ","е§Ҙе§Ҙ"]];
  users.forEach(u=>{
    sheet2.push([u, st[u].p, st[u].w, st[u].j, st[u].bj,
      st[u].n, st[u].z, st[u].l, st[u].a2, st[u].a6, st[u].c3, st[u].b4,
      st[u].bg, st[u].zh, st[u].ll]);
  });

  // з”ҹжҲҗж–Үд»¶
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(sheet1), "е®һж—¶жҲҳжҠҘ");
  XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(sheet2), "и®Ўж•°з»ҹи®Ў");
  XLSX.writeFile(wb, "йә»е°Ҷи®°еҪ•.xlsx");
}

refresh();
</script>
</body>
</html>
