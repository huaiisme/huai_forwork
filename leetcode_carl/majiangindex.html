<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>麻将计分本（财神+军师版）</title>
<style>
/* ... 原有样式保持不变 ... */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}
body {
  font-family: "Microsoft YaHei", sans-serif;
  background: #f9f1f1;
  padding: 10px;
}

/* 用户管理区域样式 */
.user-manage-box {
  background: #fff;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 15px;
}
.manage-title {
  font-weight: bold;
  color: #333;
  margin-bottom: 10px;
  text-align: center;
}
.manage-row {
  display: flex;
  gap: 8px;
  margin-bottom: 8px;
}
.manage-input {
  flex: 1;
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 14px;
}
.manage-select {
  flex: 1;
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 14px;
  background: #fff;
}
.btn-add { background: #2d882d; color: #fff; border: none; padding: 0 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
.btn-del { background: #d92c2c; color: #fff; border: none; padding: 0 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
.btn-add:disabled, .btn-del:disabled { background: #ccc; cursor: not-allowed; }

/* 通用统计面板样式 */
.stats-box {
  background: #fff;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 15px;
  overflow-x: auto;
}
.stats-title {
  font-weight: bold;
  color: #d92c2c;
  text-align: center;
  margin-bottom: 10px;
  font-size: 20px;
}
.stats-header {
  display: flex;
  font-weight: bold;
  font-size: 16px;
  color: #666;
  border-bottom: 1px solid #eee;
  padding-bottom: 8px;
}
.stats-row {
  display: flex;
  font-size: 15px;
  padding: 6px 0;
  border-bottom: 1px solid #f8f8f8;
}
.stats-name { 
  min-width: 70px; 
  font-weight: bold; 
  font-size: 16px;
}
.stats-item { 
  min-width: 45px; 
  text-align: center; 
  font-size: 15px;
}

/* 合并统计面板容器 */
.combined-stats-container {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}
.combined-block {
  flex: 1;
  min-width: 320px;
}
.game-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
  gap: 8px;
}

/* 放炮/自摸牌统计面板样式 */
.tile-stats-box {
  background: #fff;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 15px;
  overflow-x: auto;
}
.tile-stats-title {
  font-weight: bold;
  color: #d92c2c;
  text-align: center;
  margin-bottom: 12px;
  font-size: 18px;
}
.tile-stats-subtitle {
  font-weight: bold;
  font-size: 14px;
  color: #666;
  margin: 10px 0 6px;
  padding-left: 4px;
}
.tile-rank-grid {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}
.tile-rank-item {
  padding: 6px 8px;
  background: #f8f8f8;
  border-radius: 8px;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.tile-rank-char {
  font-size: 20px;
}
.person-tile-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 8px;
}
.person-tile-card {
  background: #f8f8f8;
  border-radius: 8px;
  padding: 8px;
}
.person-tile-name {
  font-weight: bold;
  margin-bottom: 6px;
  color: #d92c2c;
}
.person-tile-list {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  font-size: 12px;
}
.empty-tip {
  text-align: center;
  color: #999;
  padding: 10px 0;
  font-size: 14px;
}

/* 输赢榜统计面板样式 */
.settle-box {
  background: #fff;
  border-radius: 12px;
  padding: 15px;
  margin-bottom: 15px;
}
.settle-history-item {
  border-bottom: 1px solid #eee;
  padding: 8px 0;
  margin-bottom: 10px;
}
.settle-history-time {
  font-size: 12px;
  color: #999;
  margin-bottom: 6px;
}
.settle-rank-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
  margin: 3px 0;
  padding: 4px 8px;
  border-radius: 4px;
}
/* 财神爷专属高亮样式 */
.rank-gold {
  background: linear-gradient(90deg, #ffd700, #fff3cd);
  border: 2px solid #ffaa00;
  font-weight: bold;
  color: #b8860b;
}
.rank-1 {
  color: #2d882d;
  font-weight: bold;
}
.rank-last {
  color: #d92c2c;
  font-weight: bold;
}
.settle-result-text {
  font-weight: bold;
  color: #d92c2c;
  margin-top: 8px;
  font-size: 15px;
  text-align: center;
  background: #fff3cd;
  padding: 8px;
  border-radius: 6px;
}

/* 场地选择样式 */
.site-group {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.site-group input {
  display: none;
}
.site-group label {
  flex: 1;
  min-width: 80px;
  padding: 10px 6px;
  background: #f0f0f0;
  border-radius: 8px;
  text-align: center;
  font-weight: bold;
  font-size: 14px;
  border: 2px solid #ddd;
  cursor: pointer;
}
/* 水印城：蓝色 */
.site-group input[value="水印城"]:checked + label {
  background: #366895;
  color: #fff;
  border-color: #2a5277;
  box-shadow: 0 0 8px rgba(54,104,149,0.4);
}
/* 揽云锦绣：绿色 */
.site-group input[value="揽云锦绣"]:checked + label {
  background: #2d882d;
  color: #fff;
  border-color: #236b23;
  box-shadow: 0 0 8px rgba(45,136,45,0.4);
}

/* 人员选择样式 */
.person-group {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
  flex-wrap: wrap;
}
.person-group input {
  display: none;
}
.person-group label {
  flex: 1;
  min-width: 50px;
  padding: 8px 6px;
  background: #f0f0f0;
  border-radius: 8px;
  text-align: center;
  font-weight: bold;
  font-size: 14px;
  border: 2px solid #ddd;
  cursor: pointer;
}
.person-group input:checked + label {
  background: #d92c2c;
  color: #ffdd66;
  border-color: #ffaa00;
  box-shadow: 0 0 8px rgba(217,44,44,0.4);
}

/* 动作按钮样式 */
.action-group {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  margin-bottom: 12px;
}
.action-group button {
  padding: 10px 4px;
  background: #e67e22;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  font-size: 14px;
}
.action-group button:active {
  background: #cc6c1c;
}
/* 输赢结算按钮特殊样式 */
.btn-settle { background: #9b59b6; grid-column: span 4; }
/* 胡按钮样式 */
.btn-hu { background: #ff4757; color: #fff; font-size: 16px; padding: 12px 4px; }
/* 菜P操作按钮样式 */
.btn-caip { background: #1abc9c; }

/* 日志 */
.log-box {
  background: #fff;
  border-radius: 12px;
  padding: 10px;
  height: 180px;
  overflow-y: auto;
  margin-bottom: 12px;
  font-size: 14px;
  line-height: 1.5;
}

/* 功能按钮 */
.func-group {
  display: flex;
  gap: 8px;
  flex-wrap: wrap; /* 允许换行 */
}
.func-group button {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 8px;
  color: #fff;
  font-weight: bold;
  font-size: 14px;
  min-width: 80px; /* 防止按钮太窄 */
}
.btn-undo { background: #366895; }
.btn-clear { background: #e67e22; }
.btn-export { background: #2d882d; }
/* 新增：称号鉴定按钮样式 */
.btn-title { background: #ff6b81; } 
/* 新增：军师按钮样式 */
.btn-military { background: #6c757d; }
.btn-military.active { background: #ff4757; box-shadow: 0 0 10px rgba(255, 71, 87, 0.6); }

/* 通用弹窗 */
.modal {
  position: fixed;
  top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  display: none;
  justify-content: center;
  align-items: center;
  padding: 20px;
  z-index: 999;
}
.modal.show { display: flex; }
.modal-box {
  background: #fff;
  border-radius: 12px;
  padding: 20px;
  width: 100%;
  max-width: 500px;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-title {
  font-weight: bold;
  text-align: center;
  margin-bottom: 15px;
  font-size: 18px;
}

/* 菜P操作弹窗 */
.caip-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 15px;
}
.caip-btn {
  padding: 15px;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  font-size: 18px;
  background: #1abc9c;
  color: #fff;
}
.caip-btn:active { background: #16a085; }

/* 胡数选择弹窗 */
.hu-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin-bottom: 15px;
}
.hu-btn {
  padding: 12px;
  background: #ff4757;
  color: #fff;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  font-size: 15px;
}
.hu-type-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 15px;
  margin-top: 10px;
}
.hu-type-btn {
  padding: 15px;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  font-size: 16px;
}
.btn-pao { background: #e74c3c; color: #fff; }
.btn-zimo { background: #f1c40f; color: #333; }

/* 输赢结算弹窗样式 */
.gold-select-group {
  margin-bottom: 15px;
  padding: 10px;
  background: #fff3cd;
  border-radius: 8px;
  border: 1px solid #ffc107;
}
.gold-select-label {
  font-weight: bold;
  color: #b8860b;
  margin-bottom: 8px;
  display: block;
  text-align: center;
}
.gold-select {
  width: 100%;
  padding: 10px;
  border: 2px solid #ffc107;
  border-radius: 8px;
  font-size: 16px;
  font-weight: bold;
  text-align: center;
  background: #fff;
}
.settle-input-group {
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.settle-input-label {
  width: 60px;
  font-weight: bold;
}
.settle-input {
  flex: 1;
  padding: 10px;
  border: 1px solid #ddd;
  border-radius: 8px;
  font-size: 16px;
  text-align: right;
}
.settle-btn-group {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}
.settle-btn-group button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  font-size: 16px;
}
.btn-save-settle { background: #2d882d; color: #fff; }
.btn-cancel-settle { background: #ddd; color: #333; }

/* 选牌弹窗 */
.tile-grid {
  display: grid;
  grid-template-columns: repeat(9, 1fr);
  gap: 8px;
  margin-bottom: 15px;
}
.tile-btn {
  padding: 8px;
  font-size: 32px;
  border: 1px solid #ddd;
  border-radius: 8px;
  background: #fff;
  cursor: pointer;
}
.tile-btn:active {
  background: #f0f0f0;
  border-color: #d92c2c;
}
.tile-type-title {
  font-weight: bold;
  margin: 10px 0 5px;
  color: #666;
}

/* 选人弹窗 */
.target-list {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.target-list button {
  padding: 14px;
  background: #d92c2c;
  color: #ffdd66;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  font-size: 16px;
}

/* 称号鉴定弹窗样式 */
.title-display-box {
  background: #fffef0;
  border: 2px solid #ffd700;
  border-radius: 8px;
  padding: 15px;
  margin-bottom: 15px;
}
.title-rule-item {
  font-size: 13px;
  color: #666;
  margin-bottom: 4px;
  padding-left: 10px;
}
.title-result-item {
  display: flex;
  justify-content: space-between;
  padding: 8px 0;
  border-bottom: 1px dashed #ddd;
}
.title-name {
  font-weight: bold;
  color: #d92c2c;
}
.title-owner {
  font-weight: bold;
  color: #333;
}
.title-count {
  color: #666;
  font-size: 14px;
}
</style>
</head>
<body>

<!-- 用户管理区域 -->
<div class="user-manage-box">
  <div class="manage-title">👥 成员管理</div>
  <div class="manage-row">
    <input type="text" id="newUserInput" class="manage-input" placeholder="输入新成员昵称">
    <button class="btn-add" id="btnAddUser" onclick="addUser()">添加</button>
  </div>
  <div class="manage-row">
    <select id="delUserSelect" class="manage-select">
      <option value="">选择要删除的成员</option>
    </select>
    <button class="btn-del" id="btnDelUser" onclick="deleteUser()">删除</button>
  </div>
</div>

<!-- 场地选择 -->
<div class="site-group">
  <input type="radio" name="site" id="s1" value="水印城" checked>
  <label for="s1">水印城</label>
  <input type="radio" name="site" id="s2" value="揽云锦绣">
  <label for="s2">揽云锦绣</label>
</div>

<!-- 基础数据统计面板 -->
<div class="stats-box">
  <div class="stats-title">实时统计</div>
  <div class="stats-header">
    <div class="stats-name">玩家</div>
    <div class="stats-item">放炮</div>
    <div class="stats-item">获胜</div>
    <div class="stats-item">自摸</div>
    <div class="stats-item">截胡</div>
    <div class="stats-item">被截</div>
    <div class="stats-item">泥鳅</div>
    <div class="stats-item">3财神</div>
    <div class="stats-item">4白板</div>
    <div class="stats-item">天&地胡</div>
    <div class="stats-item">被跟</div>
    <div class="stats-item">诈胡</div>
    <div class="stats-item">姥姥</div>
    <div class="stats-item">牌局</div>
    <div class="stats-item">30/40胡</div>
    <div class="stats-item">50-80胡</div>
    <div class="stats-item">90-200胡</div>
    <div class="stats-item">210-390胡</div>
    <div class="stats-item">400胡</div>
  </div>
  <div id="stats"></div>
</div>

<!-- 合并：放炮/自摸牌统计 + 牌局参与统计面板 -->
<div class="tile-stats-box">
  <div class="tile-stats-title">🎴 胡牌统计 & 牌局参与</div>
  <div class="combined-stats-container">
    <div class="combined-block">
      <div class="tile-stats-subtitle">💥 全局放炮牌排行</div>
      <div class="tile-rank-grid" id="globalPaoTileRank"></div>
      <div class="tile-stats-subtitle">👤 个人放炮明细</div>
      <div class="person-tile-grid" id="personPaoTileDetail"></div>
    </div>
    <div class="combined-block">
      <div class="tile-stats-subtitle">⭐ 全局自摸牌排行</div>
      <div class="tile-rank-grid" id="globalZimoTileRank"></div>
      <div class="tile-stats-subtitle">👤 个人自摸明细</div>
      <div class="person-tile-grid" id="personZimoTileDetail"></div>
    </div>
    <div class="combined-block">
      <div class="tile-stats-subtitle">📊 牌局参与统计</div>
      <div class="game-grid" id="gameCountDetail"></div>
    </div>
  </div>
</div>

<!-- 输赢榜展示 -->
<div class="settle-box" id="settleBox" style="display:none;">
  <div class="tile-stats-title">🏆 历史输赢榜 & 财神记录</div>
  <div id="settleHistory"></div>
</div>

<!-- 玩家选择 (动态渲染) -->
<div class="person-group" id="personGroupContainer"></div>

<!-- 动作按钮 -->
<div class="action-group">
  <button onclick="openHuModal()" class="btn-hu">胡！</button>
  <button onclick="prepareJieHu()">截胡</button>
  <button onclick="actOne('泥鳅')">泥鳅</button>
  <button onclick="openDogLuckModal()" style="background:#e67e22;">真的狗运受不了！</button>
  <button onclick="openCaiPModal()" class="btn-caip">菜P操作</button>
  <button onclick="prepareOB()" style="background:#8e44ad;">边缘OB</button>
  <button onclick="openSettleModal()" class="btn-settle">👑 输赢结算（指定财神）</button>
</div>

<!-- 操作日志 -->
<div class="log-box" id="log"></div>

<!-- 功能按钮 -->
<div class="func-group">
  <button class="btn-undo" onclick="undo()">撤销</button>
  <button class="btn-clear" onclick="clearAll()">清空</button>
  <button class="btn-export" onclick="exportExcel()">导出Excel</button>
  <button class="btn-title" onclick="openTitleModal()">🏆 称号鉴定</button>
  <button class="btn-military" id="btnMilitary" onclick="toggleMilitary()">我来当军师！</button>
</div>

<!-- 菜P操作弹窗 -->
<div class="modal" id="caiPModal">
  <div class="modal-box">
    <div class="modal-title">请选择菜P操作</div>
    <div class="caip-grid">
      <button class="caip-btn" onclick="actCaiP('第一张被跟')">第一张被跟</button>
      <button class="caip-btn" onclick="actCaiP('诈胡')">诈胡</button>
      <button class="caip-btn" onclick="actCaiP('姥姥')">姥姥</button>
    </div>
  </div>
</div>

<!-- 狗运操作弹窗 -->
<div class="modal" id="dogLuckModal">
  <div class="modal-box">
    <div class="modal-title">请选择狗运操作</div>
    <div class="caip-grid">
      <button class="caip-btn" onclick="actDogLuck('3财神')">3财神</button>
      <button class="caip-btn" onclick="actDogLuck('4白板')">4白板</button>
      <button class="caip-btn" onclick="actDogLuck('天&地胡')">天&地胡</button>
    </div>
  </div>
</div>

<!-- 胡数选择弹窗 -->
<div class="modal" id="huModal">
  <div class="modal-box">
    <div class="modal-title">请选择胡数</div>
    <div class="hu-grid" id="huGrid"></div>
  </div>
</div>

<!-- 胡类型选择弹窗（放炮/自摸） -->
<div class="modal" id="huTypeModal">
  <div class="modal-box">
    <div class="modal-title" id="huTypeTitle">请选择胡牌类型</div>
    <div class="hu-type-grid">
      <button class="hu-type-btn btn-pao" onclick="selectHuType('pao')">某人放炮</button>
      <button class="hu-type-btn btn-zimo" onclick="selectHuType('zimo')">自摸</button>
    </div>
  </div>
</div>

<!-- 选牌弹窗 -->
<div class="modal" id="tileModal">
  <div class="modal-box">
    <div class="modal-title" id="tileModalTitle">请选择牌</div>
    <div class="tile-type-title">万子</div><div class="tile-grid" id="wanGrid"></div>
    <div class="tile-type-title">条子</div><div class="tile-grid" id="tiaoGrid"></div>
    <div class="tile-type-title">筒子</div><div class="tile-grid" id="tongGrid"></div>
    <div class="tile-type-title">字牌</div><div class="tile-grid" id="ziGrid"></div>
  </div>
</div>

<!-- 选人弹窗 -->
<div class="modal" id="personModal">
  <div class="modal-box">
    <div class="modal-title" id="personModalTitle">选择目标</div>
    <div class="target-list" id="personList"></div>
  </div>
</div>

<!-- 输赢结算弹窗 -->
<div class="modal" id="settleModal">
  <div class="modal-box">
    <div class="modal-title">💰 最终输赢结算</div>
    <div class="gold-select-group">
      <label class="gold-select-label">👉 请指定本次付钱的财神爷为第几名</label>
      <select id="goldRankSelect" class="gold-select">
        <option value="1">第1名</option><option value="2">第2名</option>
        <option value="3">第3名</option><option value="4">第4名</option>
        <option value="5" selected>第5名（默认输最多）</option>

// 统计计算
function calcBaseStats() {
  let st = {};
  // 初始化：增加胡数分段统计
  users.forEach(u=>st[u]={
    p:0,w:0,z:0,j:0,bj:0,n:0,c3:0,b4:0,tdh:0,bg:0,zh:0,ll:0,game:0,militaryP:0,
    hu30_40:0, hu50_80:0, hu90_200:0, hu210_390:0, hu400:0
  });
  
  records.forEach(r=>{
    if (r.t === "pao" && st[r.from]) { 
      // 检查是否有军师介入
      if(r.military && r.military.active) {
        st[r.from].p += 0.5; // 放炮者计 0.5
        if(st[r.military.user]) {
          st[r.military.user].p += 0.5; // 军师计 0.5
          st[r.military.user].militaryP += 0.5; // 军师专属统计
        }
      } else {
        st[r.from].p++; // 正常放炮计 1
      }
      if(st[r.to]) st[r.to].w++; 
    }
    if (r.t === "zimo" && st[r.from]) { 
        st[r.from].w++; 
        st[r.from].z++; // 新增自摸计数
    }
    if (r.t === "jie" && st[r.from]) { st[r.from].j++; if(st[r.to]) st[r.to].bj++; }
    if (r.t === "ob") { users.forEach(u => { if (!r.obUsers.includes(u) && st[u]) st[u].game++; }); }
    if (r.t === "one" && st[r.f]) {
      const a = r.a;
      if(a==="泥鳅")st[r.f].n++;if(a==="3财神")st[r.f].c3++;if(a==="4白板")st[r.f].b4++;if(a==="天&地胡")st[r.f].tdh++;
      if(a==="第一张被跟")st[r.f].bg++;if(a==="诈胡")st[r.f].zh++;if(a==="姥姥")st[r.f].ll++;
    }

    // 胡数分段统计 (修改版)
    if((r.t === "pao" || r.t === "zimo") && r.huScore) {
      const hu = r.huScore;
      const user = r.t === "pao" ? r.to : r.from;
      if(!st[user]) return;
      
      if(hu === 30 || hu === 40) st[user].hu30_40++;
      else if(hu >= 50 && hu <= 80) st[user].hu50_80++;
      else if(hu >= 90 && hu <= 200) st[user].hu90_200++;
      else if(hu >= 210 && hu <= 390) st[user].hu210_390++;
      else if(hu === 400) st[user].hu400++;
    }
  });
  return st;
}

function calcTileStats(type) {
  let globalCount = {}, personCount = {};
  users.forEach(u => personCount[u] = {});
  records.filter(r => r.t === type).forEach(r => {
    const k = `${r.tileName}${r.tile}`;
    globalCount[k]=(globalCount[k]||0)+1;
    personCount[r.from][k]=(personCount[r.from][k]||0)+1;
  });
  return {
    sortedGlobal: Object.entries(globalCount).sort((a,b)=>b[1]-a[1]).map(i=>({tile:i[0],count:i[1]})),
    personCount
  };
}

// 界面刷新
function refresh() {
  const base=calcBaseStats(), pao=calcTileStats("pao"), zimo=calcTileStats("zimo");
  // 统计面板
  stats.innerHTML = users.map(u=>{
    const d=base[u]||{p:0,w:0,z:0,j:0,bj:0,n:0,c3:0,b4:0,tdh:0,bg:0,zh:0,ll:0,game:0,militaryP:0,hu30_40:0,hu50_80:0,hu90_200:0,hu210_390:0,hu400:0};
    // 处理小数显示
    const displayP = Number.isInteger(d.p)? d.p : d.p.toFixed(1);
    return `<div class="stats-row">
      <div class="stats-name">${u}</div>
      <div class="stats-item">${displayP}</div><div class="stats-item">${d.w}</div>
      <div class="stats-item">${d.z}</div>
      <div class="stats-item">${d.j}</div><div class="stats-item">${d.bj}</div>
      <div class="stats-item">${d.n}</div><div class="stats-item">${d.c3}</div>
      <div class="stats-item">${d.b4}</div><div class="stats-item">${d.tdh}</div>
      <div class="stats-item">${d.bg}</div>
      <div class="stats-item">${d.zh}</div><div class="stats-item">${d.ll}</div>
      <div class="stats-item" style="color:#8e44ad">${d.game}</div>
      <div class="stats-item">${d.hu30_40}</div>
      <div class="stats-item">${d.hu50_80}</div>
      <div class="stats-item">${d.hu90_200}</div>
      <div class="stats-item">${d.hu210_390}</div>
      <div class="stats-item">${d.hu400}</div>
    </div>`;
  }).join("");

  // 牌统计渲染
  const r=(s,g,p)=>{
    document.getElementById(g).innerHTML=s.sortedGlobal.length?
      s.sortedGlobal.map(i=>`<div class="tile-rank-item"><span class="tile-rank-char">${i.tile.slice(-2)}</span><span>${i.tile.slice(0,-2)}×${i.count}</span></div>`).join("")
      :'<div class="empty-tip">暂无记录</div>';
    document.getElementById(p).innerHTML=users.map(u=>{
      const t=Object.entries(s.personCount[u]||{}).sort((a,b)=>b[1]-a[1]);
      return `<div class="person-tile-card"><div class="person-tile-name">${u}</div>
      <div class="person-tile-list">${t.length?t.map(i=>`<span>${i[0].slice(-2)}×${i[1]}</span>`).join(""):'<span style="color:#999">暂无</span>'}</div></div>`;
    }).join("");
  };
  r(pao,"globalPaoTileRank","personPaoTileDetail");
  r(zimo,"globalZimoTileRank","personZimoTileDetail");

  // 牌局统计
  document.getElementById("gameCountDetail").innerHTML=users.map(u=>
    `<div class="person-tile-card"><div class="person-tile-name">${u}</div>
    <div style="font-size:24px;color:#8e44ad;text-align:center">${(base[u]||{}).game||0}局</div></div>`
  ).join("");

  log.innerText = records.map(r=>`[${r.time}] ${r.desc}`).join("\n");
  refreshSettleUI();
  saveToLocal();
}

function openSettleModal() {

function saveSettle() {
  const goldRank = parseInt(goldRankSelect.value);
  let amounts = [];
  users.forEach(u => {
    const input = document.getElementById(`settle_${u}`);
    let val = parseFloat(input.value) || 0;
    amounts.push({ user: u, amount: val });
  });
  const ranked = [...amounts].sort((a, b) => b.amount - a.amount);
  if(goldRank > ranked.length) { alert("名次无效！"); return; }
  const goldUser = ranked[goldRank - 1];
  const resultText = `本次指定第${goldRank}名为财神爷👑：${goldUser.user} 负责付钱！`;
  
  settleRecords.push({
    time: now(), goldRank: goldRank, goldUser: goldUser.user, ranked: ranked, resultText: resultText, raw: amounts
  });
  closeModal(settleModal);
  refresh();
}

function refreshSettleUI() {
  if (settleRecords.length === 0) { settleBox.style.display = "none"; return; }
  settleBox.style.display = "block";
  let html = "";
  [...settleRecords].reverse().forEach(rec => {
    html += `<div class="settle-history-item"><div class="settle-history-time">${rec.time}</div>`;
    rec.ranked.forEach((item, idx) => {
      const rank = idx + 1;
      const isGold = rank === rec.goldRank;
      const c = item.amount > 0 ? "color:#2d882d" : (item.amount < 0 ? "color:#d92c2c" : "");
      let cls = "settle-rank-row";
      if(isGold) cls += " rank-gold"; else if(rank===1) cls += " rank-1"; else if(rank===rec.ranked.length) cls += " rank-last";
      html += `<div class="${cls}"><span>第${rank}名：${item.user} ${isGold?"👑":""}</span><span style="${c};font-weight:bold">${item.amount>0?"+":""}${item.amount.toFixed(2)}元</span></div>`;
    });
    html += `<div class="settle-result-text">${rec.resultText}</div></div>`;
  });
  settleHistory.innerHTML = html;
}

// ========== 称号鉴定逻辑 (修改版) ==========
function calcTitles() {
  const base = calcBaseStats();
  const titleData = [];
  
  // 辅助函数：找出最大值玩家 (支持平局)
  const findMax = (keyFn) => {
    let maxVal = -1;
    let maxUsers = [];
    users.forEach(u => {
      const val = keyFn(base[u] || {});
      if (val > maxVal) {
        maxVal = val;
        maxUsers = [u];
      } else if (val === maxVal && val > 0) {
        maxUsers.push(u);
      }
    });
    return { users: maxUsers, count: maxVal };
  };
  
  // 辅助函数：找出最小值玩家 (支持平局)
  const findMin = (keyFn) => {
    let minVal = Infinity;
    let minUsers = [];
    users.forEach(u => {
      const val = keyFn(base[u] || {});
      if (val > 0) { // 必须参与过（大于0）
        if (val < minVal) {
          minVal = val;
          minUsers = [u];
        } else if (val === minVal) {
          minUsers.push(u);
        }
      }
    });
    return { users: minUsers, count: minVal };
  };

  // 1. 放炮王
  const pao = findMax(d => d.p);
  if (pao.users.length > 0) titleData.push(["放炮王", pao.users.join("、"), pao.count, "放炮最多的称为放炮王"]);

  // 2. 他是真的想赢
  const win = findMax(d => d.w);
  if (win.users.length > 0) titleData.push(["他是真的想赢", win.users.join("、"), win.count, "获胜最多的叫做“他是真的想赢”"]);

  // 3. 我靠我自己！(自摸最多)
  const zimo = findMax(d => d.z);
  if (zimo.users.length > 0) titleData.push(["我靠我自己！", zimo.users.join("、"), zimo.count, "自摸次数最多的称为“我靠我自己！”"]);

  // 4. 真的不当人
  const jie = findMax(d => d.j);
  if (jie.users.length > 0) titleData.push(["真的不当人", jie.users.join("、"), jie.count, "截胡最多的叫做“真的不当人”"]);

  // 5. 谁还比我惨
  const beiJie = findMax(d => d.bj);
  if (beiJie.users.length > 0) titleData.push(["谁还比我惨", beiJie.users.join("、"), beiJie.count, "被截胡数最多的叫做“谁还比我惨”"]);

  // 6. 泥鳅王
  const niqiu = findMax(d => d.n);
  if (niqiu.users.length > 0) titleData.push(["泥鳅王", niqiu.users.join("、"), niqiu.count, "泥鳅最多的称为泥鳅王"]);

  // 7. 狗运真的好！ (3财神+4白板+天&地胡)
  const luck = findMax(d => (d.c3 || 0) + (d.b4 || 0) + (d.tdh || 0));
  if (luck.users.length > 0) titleData.push(["狗运真的好！", luck.users.join("、"), luck.count, "3财神、4白板、天&地胡三者计数和最高的称为“狗运真的好！”"]);

  // 8. 操作拉跨王 (第一张被跟+姥姥+诈胡)
  const caip = findMax(d => (d.bg || 0) + (d.ll || 0) + (d.zh || 0));
  if (caip.users.length > 0) titleData.push(["操作拉跨王", caip.users.join("、"), caip.count, "第一张被跟、姥姥、诈胡三者计数和最高的称为“操作拉跨王”"]);

  // 9. 灵犀一指狗头军师 (作为军师时放炮最多)
  const milMax = findMax(d => d.militaryP);
  if (milMax.users.length > 0) titleData.push(["灵犀一指狗头军师", milMax.users.join("、"), milMax.count, "作为军师时累计分锅（放炮）最多的人"]);

  // 10. 神机妙算诸葛孔明 (作为军师时放炮最少)
  const milMin = findMin(d => d.militaryP);
  if (milMin.users.length > 0) titleData.push(["神机妙算诸葛孔明", milMin.users.join("、"), milMin.count, "作为军师时累计分锅（放炮）最少的人"]);

  // 11. 屁胡王！(30/40胡最多)
  const hu30_40 = findMax(d => d.hu30_40);
  if (hu30_40.users.length > 0) titleData.push(["屁胡王！", hu30_40.users.join("、"), hu30_40.count, "30胡和40胡计数最多的称为“屁胡王！”"]);

  // 12. 不贪王 (50-80胡最多)
  const hu50_80 = findMax(d => d.hu50_80);
  if (hu50_80.users.length > 0) titleData.push(["不贪王", hu50_80.users.join("、"), hu50_80.count, "50-80胡计数最多的称为“不贪王”"]);

  // 13. 饭没吃饱就请你们吃辣子！(400胡最多)
  const hu400 = findMax(d => d.hu400);
  if (hu400.users.length > 0) titleData.push(["饭没吃饱就请你们吃辣子！", hu400.users.join("、"), hu400.count, "400胡计数最多的称为“饭没吃饱就请你们吃辣子！”"]);

  // 14. 哥们胡很大但也没那么大 (210-390胡最多)
  const hu210_390 = findMax(d => d.hu210_390);
  if (hu210_390.users.length > 0) titleData.push(["哥们胡很大但也没那么大", hu210_390.users.join("、"), hu210_390.count, "210-390胡计数最高的称为“哥们胡很大但也没那么大”"]);

  return titleData;
}

// ========== 军师系统逻辑 ==========
function toggleMilitary() {
  if (!getSelectedSite() || !getSelectedUser()) return;

  if (militaryActive) {
    // 关闭军师模式
    militaryActive = false;
    currentMilitaryUser = "";
    currentMilitaryTarget = "";
    btnMilitary.classList.remove("active");
    records.push({
      t: "sys",
      desc: `军师模式关闭`,
      time: now()
    });
    refresh();
  } else {
    // 开启军师模式：先选人
    currentMilitaryUser = getSelectedUser();
    openMilitaryModal();
  }
}

function openMilitaryModal() {
  const list = document.getElementById("militaryPersonList");
  list.innerHTML = "";
  document.getElementById("militaryModalTitle").innerText = `【${currentMilitaryUser}】要指点谁？`;
  
  // 筛选出除了自己之外的人
  users.filter(u => u !== currentMilitaryUser).forEach(u => {
    const btn = document.createElement("button");
    btn.innerText = u;
    btn.onclick = () => {
      currentMilitaryTarget = u;
      militaryActive = true;
      btnMilitary.classList.add("active");
      closeModal(militaryModal);
      
      records.push({
        t: "sys",
        desc: `${currentMilitaryUser} 开启军师模式，指点 ${currentMilitaryTarget}`,
        time: now()
      });
      refresh();
    };
    list.appendChild(btn);
  });
  openModal(militaryModal);
}

// 撤销/清空/存储
function undo(){ 
  if(records.length===0 && settleRecords.length===0){alert("无记录");return;}
  const rt = records.length>0?records[records.length-1].time:"0";
  const st = settleRecords.length>0?settleRecords[settleRecords.length-1].time:"0";
  if(rt>st) {
    // 如果撤销的是军师开启的记录，需要重置状态
    const lastRec = records[records.length-1];
    if(lastRec.t === "sys" && lastRec.desc.includes("军师模式")) {
      militaryActive = false;
      currentMilitaryUser = "";
      currentMilitaryTarget = "";
      btnMilitary.classList.remove("active");
    }
    records.pop();
  } else settleRecords.pop();
  refresh();
}
function clearAll(){ if(confirm("清空所有？")){ records=[]; settleRecords=[]; militaryActive=false; currentMilitaryUser=""; currentMilitaryTarget=""; btnMilitary.classList.remove("active"); refresh(); } }
function saveToLocal(){
  localStorage.setItem('mj_u', JSON.stringify(users));
  localStorage.setItem('mj_r', JSON.stringify(records));
  localStorage.setItem('mj_s', JSON.stringify(settleRecords));
  // 保存军师状态
  localStorage.setItem('mj_m', JSON.stringify({
    active: militaryActive,
    user: currentMilitaryUser,
    target: currentMilitaryTarget
  }));
}
function loadLocal(){
  try{
    const u=localStorage.getItem('mj_u'); if(u) users=JSON.parse(u);
    const r=localStorage.getItem('mj_r'); if(r) records=JSON.parse(r);
    const s=localStorage.getItem('mj_s'); if(s) settleRecords=JSON.parse(s);
    // 恢复军师状态
    const m=localStorage.getItem('mj_m'); 
    if(m) {
      const mData = JSON.parse(m);
      militaryActive = mData.active;
      currentMilitaryUser = mData.user;
      currentMilitaryTarget = mData.target;
      if(militaryActive) btnMilitary.classList.add("active");
    }
  }catch(e){}
}

// 启动
initHuGrid();
initTiles();
loadLocal();
refreshAllUI();
